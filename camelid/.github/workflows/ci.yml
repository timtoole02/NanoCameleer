name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  public-scrub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for private operator details
        run: bash scripts/check-public-scrub.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit public evidence bundles for private details
        run: node scripts/audit-evidence-bundle-privacy.mjs --strict

      - name: Verify public evidence bundle checksums
        run: bash scripts/check-evidence-bundle-checksums.sh

      - name: Check public evidence claims
        run: node scripts/check-public-evidence-claims.mjs

      - name: Check README screenshot contract
        run: node scripts/test-readme-screenshot.mjs

      - name: Check README status contract
        run: |
          set -euo pipefail
          ! grep -n -E '^(## Current Status|As of 2026-05-22, Camelid is useful but deliberately narrow:|- \\*\\*(Working product surface|Supported exact rows|Next row|Blocked row|Performance posture):\\*\\*)' README.md

  rust:
    runs-on: ubuntu-latest
    needs: public-scrub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features

      - name: Docs
        run: cargo doc --no-deps --all-features

  validation-scripts:
    runs-on: ubuntu-latest
    needs: public-scrub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validation harness self-tests
        run: |
          set -euo pipefail
          for test_script in scripts/test-*.mjs; do
            echo "== ${test_script}"
            node "${test_script}"
          done

  frontend:
    runs-on: ubuntu-latest
    needs: public-scrub
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Frontend support-contract smoke
        run: npm run smoke:model-state

      - name: Frontend 3B exact-row closure smoke
        run: npm run smoke:3b-closure

      - name: Frontend integration smoke
        run: npm run smoke:integration
